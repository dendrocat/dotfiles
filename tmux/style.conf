# statusline
set -g status-position top
set -g status-interval 5

set -g status-left "#[bg=#cdd6f4,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#cdd6f4]"
set -g status-right "#[bg=#1e1e2e,fg=#89b4fa]#[bg=#89b4fa,fg=#1e1e2e,bold]#{?window_zoomed_flag, ZOOM,} P:#{window_panes} W:#{session_windows} "
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

setw -g window-status-current-style "fg=#89b4fa,bold"
set-window-option -g window-status-format " #I: #W"
set-window-option -g window-status-current-format "#[bg=#89b4fa,fg=#1e1e2e] #I:#W #[bg=#1e1e2e,fg=#89b4fa]"

# Pane border colors
set -g pane-border-style 'fg=#30363d'
set -g pane-active-border-style 'fg=#cdd6f4'

# Message styling
set -g message-style 'bg=#89b4fa fg=#1e1e2e bold'

